services:
  # Backend API
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_123}
      - JWT_EXPIRE=7d
      - ADMIN_SECRET=admin123
      - CLIENT_URL=http://localhost:9090
    restart: always

  # Frontend UI
  frontend:
    build:
      context: ./my-app
      args:
        - REACT_APP_API_URL=http://localhost:5000
    ports:
      - "9090:80"
    depends_on:
      - backend
    restart: always
